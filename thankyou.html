<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You for Your Upload</title>
    <link rel="stylesheet" href="css/style.css">

</head>
<body class="thank-you-page">
    <div class="thankyou-container">
        <h1>Thank You!</h1>
        <p>Your images and text have been uploaded successfully.</p>
        <p>Please save your reference number below and provide it when placing your order:</p>
        <div class="reference-code" id="referenceCode">Loading...</div>
        <a href="index.html">Back to Home</a>
    </div>
    <script>
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        const code = getQueryParam('code');
        document.getElementById('referenceCode').textContent = code || 'N/A';
    </script>
</body>
</html>
