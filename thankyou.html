<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You for Your Upload</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .thankyou-container {
            max-width: 500px;
            margin: 60px auto;
            padding: 40px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            text-align: center;
        }
        .reference-code {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent-primary, #7c4dff);
            margin: 20px 0;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="thankyou-container">
        <h1>Thank You!</h1>
        <p>Your images and text have been uploaded successfully.</p>
        <p>Please save your reference number below and provide it when placing your order:</p>
        <div class="reference-code" id="referenceCode">Loading...</div>
        <a href="index.html" style="display:inline-block;margin-top:30px;color:var(--accent-primary,#7c4dff);text-decoration:underline;">Back to Home</a>
    </div>
    <script>
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        const code = getQueryParam('code');
        document.getElementById('referenceCode').textContent = code || 'N/A';
    </script>
</body>
</html>
