<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You for Your Upload</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: var(--bg-main, #f6f6fa);
            color: var(--text-primary, #222);
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .thankyou-container {
            max-width: 480px;
            margin: 60px auto;
            padding: 40px 32px 32px 32px;
            background: var(--bg-card, #fff);
            border-radius: 14px;
            box-shadow: 0 4px 24px rgba(124,77,255,0.08), 0 1.5px 6px rgba(0,0,0,0.03);
            text-align: center;
            border: 1px solid var(--border-color, #ececec);
        }
        .thankyou-container h1 {
            color: var(--accent-primary, #7c4dff);
            margin-bottom: 18px;
            font-size: 2.2rem;
            font-weight: 700;
        }
        .thankyou-container p {
            color: var(--text-secondary, #444);
            margin-bottom: 16px;
            font-size: 1.08rem;
        }
        .reference-code {
            font-size: 2.1rem;
            font-weight: 700;
            color: var(--accent-primary, #7c4dff);
            margin: 24px 0 18px 0;
            letter-spacing: 2.5px;
            background: var(--bg-input, #f3f0ff);
            border-radius: 8px;
            padding: 12px 0;
            border: 1.5px dashed var(--accent-primary, #7c4dff);
            box-shadow: 0 2px 8px rgba(124,77,255,0.04);
        }
        .thankyou-container a {
            display: inline-block;
            margin-top: 28px;
            color: var(--accent-primary, #7c4dff);
            background: var(--bg-input, #f3f0ff);
            border: 1px solid var(--accent-primary, #7c4dff);
            border-radius: 8px;
            padding: 10px 28px;
            font-size: 1.08rem;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.2s, color 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 8px rgba(124,77,255,0.04);
        }
        .thankyou-container a:hover {
            background: var(--accent-primary, #7c4dff);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="thankyou-container">
        <h1>Thank You!</h1>
        <p>Your images and text have been uploaded successfully.</p>
        <p>Please save your reference number below and provide it when placing your order:</p>
        <div class="reference-code" id="referenceCode">Loading...</div>
        <a href="index.html">Back to Home</a>
    </div>
    <script>
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        const code = getQueryParam('code');
        document.getElementById('referenceCode').textContent = code || 'N/A';
    </script>
</body>
</html>
